<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакти</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f8fafc;}
nav{display:flex;justify-content:space-between;padding:15px 30px;background:#0f172a;color:white;}
.menu{display:flex;gap:20px;}
.menu a{color:white;text-decoration:none;}

.hero{background:url("banner.jpg") center/cover no-repeat;height:400px;}
.hero-text{padding:60px 20px;text-align:center;background:#f8fafc;}
.hero-text h1{font-size:36px;margin-bottom:15px;color:#0f172a;}
.hero-text p{font-size:18px;color:#1e293b;max-width:700px;margin:auto;}

.container{width:90%;max-width:800px;margin:40px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
input, textarea{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px;}
button{background:#3b82f6;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;transition:0.3s;}
button:hover{background:#2563eb;}

.contact-info{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.contact-info div{display:flex;align-items:center;gap:10px;font-size:16px;}
.contact-info div i{color:#3b82f6;}

.socials{display:flex;gap:20px;margin-top:20px;}
.socials a{text-decoration:none;color:#0f172a;font-size:24px;transition:0.3s;}
.socials a:hover{color:#3b82f6;}

.map{margin-top:30px;width:100%;height:300px;border-radius:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
</style>

<!-- Икони за социални мрежи -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

</div>

</form>

</div>

<div class="socials">
